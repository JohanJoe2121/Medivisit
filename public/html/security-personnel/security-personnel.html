<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Security Personnel Dashboard</title>
  <link rel="stylesheet" href="/css/security-personnel.css">
<link rel="stylesheet" href="/css/mobile.css" />
</head>
<body>
  <div class="topbar">
    <div class="menu-wrap">
      <button class="menu-button" type="button" data-action-code="toggleMenu()" aria-label="Open menu">&#9776;</button>
      <div class="menu" id="dashboardMenu">
        <button type="button" data-action-code="showPanel('scannerPanel');">Security QR Scanner</button>
        <button type="button" data-action-code="showPanel('currentCheckinsPanel'); loadCurrentCheckins();">Current Check-ins</button>
        <button type="button" data-action-code="showPanel('checkoutHistoryPanel'); loadCheckoutHistory();">Check-out History</button>
        <button type="button" data-action-code="showPanel('profilePanel'); loadProfile();">Profile</button>
        <button type="button" data-action-code="showComplaintPanel()">Complaint</button>
        <button type="button" data-action-code="logout()">Logout</button>
      </div>
    </div>
    <h2>Security Personnel Dashboard</h2>
    <button class="refresh-btn" type="button" data-action-code="refreshDashboard()" aria-label="Refresh dashboard">↻</button>
  </div>

  <div class="section" id="scannerPanel">
    <h3>Security QR Scanner</h3>
    <p class="muted">This is the main security personnel function on the dashboard.</p>
    <div id="qrReader"></div>
    <p id="cameraStatus">Camera scanner is not running.</p>
    <button type="button" data-action-code="startScanner()">Start QR Scanner</button>
    <button type="button" data-action-code="stopScanner()">Stop Camera</button>
    <input type="text" id="passCode" placeholder="Enter scanned pass code" />
    <button type="button" data-action-code="verifyPass()">Verify Pass</button>
    <div id="scanResult"></div>
  </div>

  <div class="section hidden" id="currentCheckinsPanel">
    <h3>Current Check-ins</h3>
    <div id="currentCheckinsList"></div>
  </div>

  <div class="section hidden" id="checkoutHistoryPanel">
    <h3>Check-out History</h3>
    <div id="checkoutHistoryList"></div>
  </div>

  <div class="section hidden" id="profilePanel">
    <h3>Profile</h3>
    <form id="profileForm">
      <input type="text" id="profileFullName" placeholder="Full name" required />
      <input type="email" id="profileEmail" placeholder="Email" disabled />
      <input type="date" id="profileBirthDate" required />
      <textarea id="profileAddress" rows="3" placeholder="Address" required></textarea>
      <button type="submit" class="submit-btn">Update Profile</button>
    </form>
    <button type="button" id="deleteAccountBtn" class="reject" data-action-code="deleteMyAccount()">Delete My Account</button>
    <div id="profilePhotoPreview"></div>
    <div id="profileMessage"></div>
  </div>

  <div class="section hidden" id="complaintPanel">
    <h3>Complaint</h3>
    <form id="complaintForm">
      <input type="text" id="complaintSubject" placeholder="Subject" required />
      <textarea id="complaintMessageText" rows="5" placeholder="Describe the issue" required></textarea>
      <button type="submit" class="submit-btn">Submit Complaint</button>
    </form>
    <div id="complaintMessage"></div>
    <h3>My Complaints</h3>
    <div id="myComplaintsList"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode/html5-qrcode.min.js"></script>
  <script src="/js/security-personnel.js"></script>
<script src="/js/session.js"></script>
</body>
</html>
