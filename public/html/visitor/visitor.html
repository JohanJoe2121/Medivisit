<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visitor Dashboard</title>
  <link rel="stylesheet" href="/css/visitor.css">
<link rel="stylesheet" href="/css/mobile.css" />
</head>
<body>
  <div class="topbar">
    <div class="menu-wrap">
      <button class="menu-button" type="button" data-action-code="toggleMenu()" aria-label="Open menu">&#9776;</button>
      <div class="menu" id="dashboardMenu">
        <button type="button" data-action-code="showPanel('visitRequestPanel');">Create New Visit Request</button>
        <button type="button" data-action-code="showPanel('profilePanel'); loadProfile();">Profile</button>
        <button type="button" data-action-code="showPanel('historyPanel'); loadHistory();">History</button>
        <button type="button" data-action-code="showPanel('currentPassPanel'); loadCurrentPass();">My QR / Pass</button>
        <button type="button" data-action-code="showComplaintPanel()">Complaint</button>
        <button type="button" data-action-code="logout()">Logout</button>
      </div>
    </div>
    <h2>Visitor Dashboard</h2>
    <button class="refresh-btn" type="button" data-action-code="refreshDashboard()" aria-label="Refresh dashboard">↻</button>
  </div>

  <div class="section" id="visitRequestPanel">
    <h3>Create Visit Request</h3>
    <p class="muted" id="requestIntro">This is the main visitor function on the dashboard.</p>
    <div id="dashboardMessage"></div>
    <form id="visitForm">
      <input type="text" id="patientCode" placeholder="Patient visitor code" required />
      <button type="button" id="checkingButton" data-action-code="checkPatient()">Check Code</button>
      <input type="hidden" id="patientId" />
      <input type="hidden" id="patientName" />
      <p id="patientResult"></p>
      <input type="date" id="visitDate" required />
      <select id="visitTimeSlot" required>
        <option value="">Loading time slots...</option>
      </select>
      <textarea id="reason" placeholder="Reason for visit" required></textarea>
      <button type="submit" id="submitBtn" class="submit-btn" disabled>Submit Request</button>
    </form>
  </div>

  <div class="section hidden" id="currentPassPanel">
    <h3>My QR / Pass</h3>
    <div id="currentPass"></div>
  </div>

  <div class="section hidden" id="historyPanel">
    <h3>History</h3>
    <div id="historyList"></div>
  </div>

  <div class="section hidden" id="profilePanel">
    <h3>Profile</h3>
    <form id="profileForm">
      <input type="text" id="profileFullName" placeholder="Full name" required />
      <input type="email" id="profileEmail" placeholder="Email" disabled />
      <input type="date" id="profileBirthDate" required />
      <textarea id="profileAddress" rows="3" placeholder="Address" required></textarea>
      <button type="submit" class="submit-btn">Update Profile</button>
    </form>
    <button type="button" id="deleteAccountBtn" class="reject" data-action-code="deleteMyAccount()">Delete My Account</button>
    <div id="profilePhotoPreview"></div>
    <div id="profileMessage"></div>
  </div>

  <div class="section hidden" id="complaintPanel">
    <h3>Complaint</h3>
    <form id="complaintForm">
      <input type="text" id="complaintSubject" placeholder="Subject" required />
      <textarea id="complaintMessageText" rows="5" placeholder="Describe the issue" required></textarea>
      <button type="submit" class="submit-btn">Submit Complaint</button>
    </form>
    <div id="complaintMessage"></div>
    <h3>My Complaints</h3>
    <div id="myComplaintsList"></div>
  </div>
  <script src="/js/visitor.js"></script>
<script src="/js/session.js"></script>
</body>
</html>
